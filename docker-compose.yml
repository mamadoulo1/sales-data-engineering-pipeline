# ============================================================
# Airflow 2.9 — Sales Data Engineering Pipeline
# LocalExecutor + PostgreSQL metadata DB
#
# Usage:
#   echo "AIRFLOW_UID=$(id -u)" > .env   # Linux/Mac only
#   docker compose up airflow-init
#   docker compose up -d
#   open http://localhost:8080  (admin / admin)
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: 'zTb5J0xG_MiWjK9vN3pLqRsYeHdFcAuBtXwIoEgOmZk='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    # Install project dependencies inside the Airflow containers at startup
    _PIP_ADDITIONAL_REQUIREMENTS: "loguru==0.7.2 pyarrow==16.1.0 pyyaml==6.0.1"
    # Make the project's src/ importable inside containers
    PYTHONPATH: /opt/airflow/src
    # Point pipeline config to container path
    PIPELINE_CONFIG: /opt/airflow/config/config.yaml
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./config:/opt/airflow/config
    - ./data:/opt/airflow/data
    - airflow-logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ----------------------------------------------------------
  # Metadata database
  # ----------------------------------------------------------
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------------------------
  # Web UI  →  http://localhost:8080  (admin / admin)
  # ----------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------------------------
  # Scheduler — detects & submits task runs
  # ----------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------------------------
  # One-shot init container: DB migration + admin user
  # ----------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
        echo "Airflow initialised — open http://localhost:8080 (admin/admin)"
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
    # No user override for init so it can write to DB
    user: "0:0"

volumes:
  postgres-db-volume:
  airflow-logs:
